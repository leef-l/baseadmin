name: goeasyadmin

services:
  mysql:
    image: docker.1ms.run/mysql:8.0
    container_name: gbaseadmin_mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-44001}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gbaseadmin_net

  redis:
    image: docker.1ms.run/redis:7-alpine
    container_name: gbaseadmin_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-44002}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gbaseadmin_net

  system:
    build:
      context: ../../admin-go
      dockerfile: ../docker/build/Dockerfile.system.cn
    container_name: gbaseadmin_system
    restart: unless-stopped
    working_dir: /app
    command: ["/bin/sh", "/docker/dev/start-go-app.sh", "system"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - GF_GCFG_FILE=config.yaml
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GF_SERVER_ADDRESS=:8000
      - DB_MIGRATE_AUTO=auto
      - TZ=Asia/Shanghai
    ports:
      - "${SYSTEM_PORT:-44003}:8000"
    volumes:
      - ./start-go-app.sh:/docker/dev/start-go-app.sh:ro
    networks:
      - gbaseadmin_net

  upload:
    build:
      context: ../../admin-go
      dockerfile: ../docker/build/Dockerfile.upload.cn
    container_name: gbaseadmin_upload
    restart: unless-stopped
    working_dir: /app
    command: ["/bin/sh", "/docker/dev/start-go-app.sh", "upload"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - GF_GCFG_FILE=config.yaml
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GF_SERVER_ADDRESS=:8002
      - DB_MIGRATE_AUTO=auto
      - TZ=Asia/Shanghai
    ports:
      - "${UPLOAD_PORT:-44004}:8002"
    volumes:
      - ./start-go-app.sh:/docker/dev/start-go-app.sh:ro
    networks:
      - gbaseadmin_net

  frontend:
    image: docker.1ms.run/node:22-alpine
    container_name: gbaseadmin_frontend
    restart: unless-stopped
    profiles:
      - frontend
    working_dir: /app
    command: ["/bin/sh", "/docker/dev/docker-web-start.sh"]
    mem_limit: ${FRONTEND_MEM_LIMIT:-384m}
    cpus: ${FRONTEND_CPUS:-0.75}
    volumes:
      - ../../vue-vben-admin:/app
      - frontend_node_modules:/app/node_modules
      - ./docker-web-start.sh:/docker/dev/docker-web-start.sh:ro
    ports:
      - "${FRONTEND_PORT:-44005}:5666"
    environment:
      - VITE_GLOB_API_URL=${VITE_GLOB_API_URL:-/api}
      - VITE_PROXY_SYSTEM_TARGET=${VITE_PROXY_SYSTEM_TARGET:-http://system:8000}
      - VITE_PROXY_UPLOAD_TARGET=${VITE_PROXY_UPLOAD_TARGET:-http://upload:8002}
      - NODE_OPTIONS=--max-old-space-size=${FRONTEND_NODE_MAX_OLD_SPACE_SIZE:-256}
      - FRONTEND_INSTALL_NODE_MAX_OLD_SPACE_SIZE=${FRONTEND_INSTALL_NODE_MAX_OLD_SPACE_SIZE:-256}
      - PNPM_NETWORK_CONCURRENCY=${PNPM_NETWORK_CONCURRENCY:-1}
      - PNPM_CHILD_CONCURRENCY=${PNPM_CHILD_CONCURRENCY:-1}
    networks:
      - gbaseadmin_net

  adminer:
    image: docker.1ms.run/adminer:latest
    container_name: gbaseadmin_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-44006}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: nette
    depends_on:
      - mysql
    networks:
      - gbaseadmin_net

  gotools:
    image: docker.1ms.run/golang:1.25.4-alpine3.22
    container_name: gbaseadmin_gotools
    profiles:
      - tools
    working_dir: /workspace
    volumes:
      - ../../admin-go:/workspace
      - go_pkg_cache:/root/go/pkg
    environment:
      - GOPROXY=https://goproxy.cn,direct
      - GOPATH=/root/go
      - CGO_ENABLED=0
    command: sh -c "apk add --no-cache git curl && tail -f /dev/null"
    networks:
      - gbaseadmin_net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local
  go_pkg_cache:
    driver: local

networks:
  gbaseadmin_net:
    driver: bridge
