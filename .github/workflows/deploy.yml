name: Deploy GBaseAdmin

on:
  push:
    branches: [main]
    paths:
      - 'admin-go/**'
      - 'vue-vben-admin/**'
      - 'wap-ui/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend
          - wap

env:
  SERVER_HOST: pw.easytestdev.online
  SERVER_USER: root
  DEPLOY_DIR: /www/wwwroot/pw.easytestdev.online
  GO_VERSION: '1.25.0'
  NODE_VERSION: '22.18.0'

jobs:
  # ============================================
  # Detect which components changed
  # ============================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      wap: ${{ steps.changes.outputs.wap }}
      target: ${{ steps.target.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'admin-go/**'
            frontend:
              - 'vue-vben-admin/**'
            wap:
              - 'wap-ui/**'

      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT
          else
            echo "value=auto" >> $GITHUB_OUTPUT
          fi

  verify-backend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.target == 'all' ||
      needs.detect-changes.outputs.target == 'backend' ||
      (needs.detect-changes.outputs.target == 'auto' && needs.detect-changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            admin-go/go.sum
            admin-go/codegen/go.sum

      - name: Verify core scope
        run: |
          bash ./scripts/verify-baseadmin-scope.sh

      - name: Test backend
        run: |
          cd admin-go
          go test ./...

      - name: Test codegen
        run: |
          cd admin-go/codegen
          go test ./...

  verify-frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.target == 'all' ||
      needs.detect-changes.outputs.target == 'frontend' ||
      (needs.detect-changes.outputs.target == 'auto' && needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Verify core scope
        run: |
          bash ./scripts/verify-baseadmin-scope.sh

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-frontend-${{ hashFiles('vue-vben-admin/pnpm-lock.yaml') }}
          restore-keys: pnpm-frontend-

      - name: Install frontend dependencies
        run: |
          cd vue-vben-admin
          pnpm install --frozen-lockfile

      - name: Verify frontend page conventions
        run: |
          bash ./scripts/verify-vben-pages.sh

      - name: Typecheck frontend
        run: |
          cd vue-vben-admin
          pnpm -F @vben/web-antd typecheck

      - name: Run frontend app tests
        run: |
          cd vue-vben-admin
          pnpm test:web-antd

  # ============================================
  # Build & Deploy backend (sequential, one by one)
  # ============================================
  deploy-system:
    needs: [detect-changes, verify-backend]
    if: |
      needs.detect-changes.outputs.target == 'all' ||
      needs.detect-changes.outputs.target == 'backend' ||
      (needs.detect-changes.outputs.target == 'auto' && needs.detect-changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: admin-go/go.sum

      - name: Build system
        run: |
          cd admin-go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -o system ./app/system/main.go

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy system
        env:
          REMOTE: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
        run: |
          ssh $REMOTE "mkdir -p /tmp/gba_stage/system"
          scp admin-go/system $REMOTE:/tmp/gba_stage/system/system
          scp -r admin-go/app/system/manifest $REMOTE:/tmp/gba_stage/system/
          ssh $REMOTE bash <<'EOF'
          set -e
          APP=system
          DEPLOY_DIR=/www/wwwroot/pw.easytestdev.online

          echo "[$APP] Stopping service..."
          systemctl stop gba-$APP 2>/dev/null || true
          for i in $(seq 1 10); do
              if ! pgrep -x "$APP" >/dev/null 2>&1; then break; fi
              sleep 1
          done

          echo "[$APP] Replacing binary..."
          mkdir -p $DEPLOY_DIR/$APP
          cp /tmp/gba_stage/$APP/$APP $DEPLOY_DIR/$APP/$APP
          chmod +x $DEPLOY_DIR/$APP/$APP

          if [ ! -f $DEPLOY_DIR/$APP/manifest/config/config.yaml ]; then
              cp -r /tmp/gba_stage/$APP/manifest $DEPLOY_DIR/$APP/
          fi

          echo "[$APP] Starting service..."
          systemctl start gba-$APP

          for i in $(seq 1 8); do
              status=$(systemctl is-active gba-$APP 2>/dev/null || echo 'unknown')
              if [ "$status" = "active" ]; then break; fi
              sleep 1
          done

          status=$(systemctl is-active gba-$APP 2>/dev/null || echo 'unknown')
          echo "[$APP] Status: $status"
          if [ "$status" != "active" ]; then exit 1; fi

          HEALTH_URL=http://127.0.0.1:8000/healthz
          echo "[$APP] Health check: $HEALTH_URL"
          for i in $(seq 1 15); do
              if curl --silent --show-error --fail "$HEALTH_URL" >/dev/null; then
                  break
              fi
              sleep 2
          done
          curl --silent --show-error --fail "$HEALTH_URL" >/dev/null

          rm -rf /tmp/gba_stage/$APP
          EOF

  deploy-upload:
    needs: [detect-changes, deploy-system]
    if: |
      always() &&
      (needs.deploy-system.result == 'success' || needs.deploy-system.result == 'skipped') &&
      (
        needs.detect-changes.outputs.target == 'all' ||
        needs.detect-changes.outputs.target == 'backend' ||
        (needs.detect-changes.outputs.target == 'auto' && needs.detect-changes.outputs.backend == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: admin-go/go.sum

      - name: Build upload
        run: |
          cd admin-go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -o upload ./app/upload/main.go

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy upload
        env:
          REMOTE: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
        run: |
          ssh $REMOTE "mkdir -p /tmp/gba_stage/upload"
          scp admin-go/upload $REMOTE:/tmp/gba_stage/upload/upload
          scp -r admin-go/app/upload/manifest $REMOTE:/tmp/gba_stage/upload/
          ssh $REMOTE bash <<'EOF'
          set -e
          APP=upload
          DEPLOY_DIR=/www/wwwroot/pw.easytestdev.online

          echo "[$APP] Stopping service..."
          systemctl stop gba-$APP 2>/dev/null || true
          for i in $(seq 1 10); do
              if ! pgrep -x "$APP" >/dev/null 2>&1; then break; fi
              sleep 1
          done

          echo "[$APP] Replacing binary..."
          mkdir -p $DEPLOY_DIR/$APP
          cp /tmp/gba_stage/$APP/$APP $DEPLOY_DIR/$APP/$APP
          chmod +x $DEPLOY_DIR/$APP/$APP

          if [ ! -f $DEPLOY_DIR/$APP/manifest/config/config.yaml ]; then
              cp -r /tmp/gba_stage/$APP/manifest $DEPLOY_DIR/$APP/
          fi

          echo "[$APP] Starting service..."
          systemctl start gba-$APP

          for i in $(seq 1 8); do
              status=$(systemctl is-active gba-$APP 2>/dev/null || echo 'unknown')
              if [ "$status" = "active" ]; then break; fi
              sleep 1
          done

          status=$(systemctl is-active gba-$APP 2>/dev/null || echo 'unknown')
          echo "[$APP] Status: $status"
          if [ "$status" != "active" ]; then exit 1; fi

          HEALTH_URL=http://127.0.0.1:8002/healthz
          echo "[$APP] Health check: $HEALTH_URL"
          for i in $(seq 1 15); do
              if curl --silent --show-error --fail "$HEALTH_URL" >/dev/null; then
                  break
              fi
              sleep 2
          done
          curl --silent --show-error --fail "$HEALTH_URL" >/dev/null

          rm -rf /tmp/gba_stage/$APP
          EOF

  # ============================================
  # Build & Deploy frontend
  # ============================================
  deploy-frontend:
    needs: [detect-changes, deploy-upload, verify-frontend]
    if: |
      always() &&
      (needs.verify-frontend.result == 'success' || needs.verify-frontend.result == 'skipped') &&
      (needs.deploy-upload.result == 'success' || needs.deploy-upload.result == 'skipped') &&
      (
        needs.detect-changes.outputs.target == 'all' ||
        needs.detect-changes.outputs.target == 'frontend' ||
        (needs.detect-changes.outputs.target == 'auto' && needs.detect-changes.outputs.frontend == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-frontend-${{ hashFiles('vue-vben-admin/pnpm-lock.yaml') }}
          restore-keys: pnpm-frontend-

      - name: Install & Build frontend
        run: |
          cd vue-vben-admin
          pnpm install --frozen-lockfile
          pnpm build:antd

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        env:
          REMOTE: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
        run: |
          cd vue-vben-admin/apps/web-antd/dist
          tar -czf /tmp/frontend.tar.gz .
          echo "Frontend size: $(du -h /tmp/frontend.tar.gz | cut -f1)"
          scp /tmp/frontend.tar.gz $REMOTE:/tmp/gba_frontend.tar.gz
          ssh $REMOTE bash <<'EOF'
          set -e
          DEPLOY_DIR=/www/wwwroot/pw.easytestdev.online
          RELEASES_DIR=$DEPLOY_DIR/.releases/admin
          RELEASE_ID=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR=$RELEASES_DIR/$RELEASE_ID
          NEXT_LINK=$DEPLOY_DIR/admin.__new

          mkdir -p $RELEASES_DIR
          rm -rf $RELEASE_DIR
          mkdir -p $RELEASE_DIR
          tar -xzf /tmp/gba_frontend.tar.gz -C $RELEASE_DIR
          test -f $RELEASE_DIR/index.html

          rm -f $NEXT_LINK
          ln -s $RELEASE_DIR $NEXT_LINK

          if [ -d $DEPLOY_DIR/admin ] && [ ! -L $DEPLOY_DIR/admin ]; then
              LEGACY_BACKUP=$DEPLOY_DIR/.legacy-admin-$(date +%Y%m%d%H%M%S)
              mv $DEPLOY_DIR/admin $LEGACY_BACKUP
          fi

          mv -Tf $NEXT_LINK $DEPLOY_DIR/admin

          ls -1dt $RELEASES_DIR/* 2>/dev/null | tail -n +6 | xargs -r rm -rf
          rm -f /tmp/gba_frontend.tar.gz
          echo "Frontend deployed to $RELEASE_DIR"
          EOF

  # ============================================
  # Build & Deploy WAP
  # ============================================
  deploy-wap:
    needs: [detect-changes, deploy-frontend]
    if: |
      always() &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') &&
      (
        needs.detect-changes.outputs.target == 'all' ||
        needs.detect-changes.outputs.target == 'wap' ||
        (needs.detect-changes.outputs.target == 'auto' && needs.detect-changes.outputs.wap == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-wap-${{ hashFiles('wap-ui/pnpm-lock.yaml') }}
          restore-keys: pnpm-wap-

      - name: Install & Build WAP
        run: |
          cd wap-ui
          pnpm install --frozen-lockfile
          pnpm build:h5

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy WAP
        env:
          REMOTE: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
        run: |
          cd wap-ui/dist
          tar -czf /tmp/wap.tar.gz .
          echo "WAP size: $(du -h /tmp/wap.tar.gz | cut -f1)"
          scp /tmp/wap.tar.gz $REMOTE:/tmp/gba_wap.tar.gz
          ssh $REMOTE bash <<'EOF'
          set -e
          DEPLOY_DIR=/www/wwwroot/pw.easytestdev.online
          mkdir -p $DEPLOY_DIR/wap
          rm -rf $DEPLOY_DIR/wap/*
          tar -xzf /tmp/gba_wap.tar.gz -C $DEPLOY_DIR/wap/
          rm -f /tmp/gba_wap.tar.gz
          echo "WAP deployed"
          EOF

  # ============================================
  # Final status report
  # ============================================
  status-check:
    needs: [deploy-system, deploy-upload, deploy-frontend, deploy-wap]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Check service status
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} bash <<'EOF'
          set -e
          echo "===== Service Status ====="
          for app in system upload; do
              status=$(systemctl is-active gba-$app 2>/dev/null || echo "unknown")
              echo "gba-$app: $status"
          done
          echo "===== Health Checks ====="
          curl --silent --show-error --fail http://127.0.0.1:8000/healthz >/dev/null && echo "system health: ok"
          curl --silent --show-error --fail http://127.0.0.1:8002/healthz >/dev/null && echo "upload health: ok"
          EOF

      - name: Summary
        run: |
          echo "## Deploy Results" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| system | ${{ needs.deploy-system.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| upload | ${{ needs.deploy-upload.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WAP | ${{ needs.deploy-wap.result }} |" >> $GITHUB_STEP_SUMMARY
