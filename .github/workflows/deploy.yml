name: Deploy GBaseAdmin

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'admin-go/**'
      - 'contracts/**'
      - 'scripts/**'
      - 'vue-vben-admin/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

permissions:
  contents: read

env:
  SERVER_HOST: baseadmin.easytestdev.online
  SERVER_USER: root
  DEPLOY_DIR: /www/wwwroot/baseadmin.easytestdev.online
  GO_VERSION: '1.25.0'
  NODE_VERSION: '22.18.0'
  PNPM_NETWORK_CONCURRENCY: '3'
  PNPM_CHILD_CONCURRENCY: '1'
  FRONTEND_NODE_MAX_OLD_SPACE_SIZE: '2048'
  BACKEND_SERVICE_TASKS_MAX: '512'
  BACKEND_SERVICE_NICE: '5'
  BACKEND_SYSTEM_MEMORY_HIGH: '384M'
  BACKEND_SYSTEM_MEMORY_MAX: '640M'
  BACKEND_SYSTEM_CPU_QUOTA: '80%'
  BACKEND_SYSTEM_OOM_SCORE_ADJUST: '200'
  BACKEND_UPLOAD_MEMORY_HIGH: '256M'
  BACKEND_UPLOAD_MEMORY_MAX: '384M'
  BACKEND_UPLOAD_CPU_QUOTA: '50%'
  BACKEND_UPLOAD_OOM_SCORE_ADJUST: '300'

jobs:
  # ============================================
  # Detect which components changed
  # ============================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      infra: ${{ steps.changes.outputs.infra }}
      target: ${{ steps.target.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            backend:
              - 'admin-go/**'
            frontend:
              - 'vue-vben-admin/**'
            infra:
              - '.github/workflows/deploy.yml'
              - 'contracts/**'
              - 'scripts/**'

      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT
          else
            echo "value=auto" >> $GITHUB_OUTPUT
          fi

  verify-backend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.target == 'all' ||
      needs.detect-changes.outputs.target == 'backend' ||
      (
        needs.detect-changes.outputs.target == 'auto' &&
        (
          needs.detect-changes.outputs.backend == 'true' ||
          needs.detect-changes.outputs.infra == 'true'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            admin-go/go.sum
            admin-go/codegen/go.sum

      - name: Verify core scope
        run: |
          bash ./scripts/verify-baseadmin-scope.sh

      - name: Test backend
        run: |
          cd admin-go
          go test ./...

      - name: Test codegen
        run: |
          cd admin-go/codegen
          go test ./...

  verify-frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.target == 'all' ||
      needs.detect-changes.outputs.target == 'frontend' ||
      (
        needs.detect-changes.outputs.target == 'auto' &&
        (
          needs.detect-changes.outputs.frontend == 'true' ||
          needs.detect-changes.outputs.infra == 'true'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Verify core scope
        run: |
          bash ./scripts/verify-baseadmin-scope.sh

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-frontend-${{ hashFiles('vue-vben-admin/pnpm-lock.yaml') }}
          restore-keys: pnpm-frontend-

      - name: Install frontend dependencies
        run: |
          cd vue-vben-admin
          pnpm install --frozen-lockfile

      - name: Verify frontend page conventions
        run: |
          bash ./scripts/verify-vben-pages.sh

      - name: Typecheck frontend
        run: |
          cd vue-vben-admin
          pnpm -F @vben/web-antd typecheck

      - name: Run frontend app tests
        run: |
          cd vue-vben-admin
          pnpm test:web-antd

  # ============================================
  # Build & Deploy backend (sequential, one by one)
  # ============================================
  deploy-system:
    needs: [detect-changes, verify-backend]
    if: |
      needs.detect-changes.outputs.target == 'all' ||
      needs.detect-changes.outputs.target == 'backend' ||
      (
        needs.detect-changes.outputs.target == 'auto' &&
        (
          needs.detect-changes.outputs.backend == 'true' ||
          needs.detect-changes.outputs.infra == 'true'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: admin-go/go.sum

      - name: Build system, migrate, and ops tools
        run: |
          cd admin-go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -o system ./app/system/main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -o migrate ./cmd/migrate
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -o ensure-smoke-user ./app/system/cmd/ensure_smoke_user
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -o upload-backfill ./app/upload/cmd/backfill_upload_dir

      - name: Validate deploy SSH secret
        run: |
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
      - name: Validate smoke test secrets
        run: |
          test -n "${{ secrets.SMOKE_USERNAME }}"
          test -n "${{ secrets.SMOKE_PASSWORD }}"
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy system
        env:
          REMOTE: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          SMOKE_USERNAME_B64=$(printf '%s' "$SMOKE_USERNAME" | base64 -w0)
          SMOKE_PASSWORD_B64=$(printf '%s' "$SMOKE_PASSWORD" | base64 -w0)
          ssh $REMOTE "mkdir -p /tmp/gba_stage/system /tmp/gba_stage/database /tmp/gba_stage/bin"
          scp admin-go/system $REMOTE:/tmp/gba_stage/system/system
          scp admin-go/migrate $REMOTE:/tmp/gba_stage/migrate
          scp admin-go/ensure-smoke-user $REMOTE:/tmp/gba_stage/bin/ensure-smoke-user
          scp admin-go/upload-backfill $REMOTE:/tmp/gba_stage/bin/upload-backfill
          scp -r admin-go/database/migrations $REMOTE:/tmp/gba_stage/database/
          scp -r admin-go/app/system/manifest $REMOTE:/tmp/gba_stage/system/
          ssh $REMOTE "SMOKE_USERNAME_B64='$SMOKE_USERNAME_B64' SMOKE_PASSWORD_B64='$SMOKE_PASSWORD_B64' bash -s" <<'EOF'
          set -euo pipefail
          APP=system
          DEPLOY_DIR=/www/wwwroot/baseadmin.easytestdev.online
          SERVICE_NAME=baseadmin-$APP
          LEGACY_SERVICE_NAME=gba-$APP
          APP_BIN=$DEPLOY_DIR/$APP/$APP
          APP_BIN_NEW=$DEPLOY_DIR/$APP/$APP.new
          SMOKE_USERNAME=$(printf '%s' "$SMOKE_USERNAME_B64" | base64 -d)
          SMOKE_PASSWORD=$(printf '%s' "$SMOKE_PASSWORD_B64" | base64 -d)

          echo "[$APP] Preparing service..."
          mkdir -p $DEPLOY_DIR/$APP
          install -m 0755 /tmp/gba_stage/$APP/$APP $APP_BIN_NEW
          install -m 0755 /tmp/gba_stage/migrate $DEPLOY_DIR/migrate
          mkdir -p $DEPLOY_DIR/bin
          install -m 0755 /tmp/gba_stage/bin/ensure-smoke-user $DEPLOY_DIR/bin/ensure-smoke-user
          install -m 0755 /tmp/gba_stage/bin/upload-backfill $DEPLOY_DIR/bin/upload-backfill
          rm -rf $DEPLOY_DIR/database/migrations
          mkdir -p $DEPLOY_DIR/database
          cp -r /tmp/gba_stage/database/migrations $DEPLOY_DIR/database/

          if [ ! -d $DEPLOY_DIR/$APP/manifest ]; then
              cp -r /tmp/gba_stage/$APP/manifest $DEPLOY_DIR/$APP/
          fi
          mkdir -p $DEPLOY_DIR/$APP/manifest/config
          if [ ! -f $DEPLOY_DIR/$APP/manifest/config/config.yaml ]; then
              if [ -f /tmp/gba_stage/$APP/manifest/config/config.yaml ]; then
                  cp /tmp/gba_stage/$APP/manifest/config/config.yaml $DEPLOY_DIR/$APP/manifest/config/config.yaml
              elif [ -f /tmp/gba_stage/$APP/manifest/config/config.yaml.example ]; then
                  cp /tmp/gba_stage/$APP/manifest/config/config.yaml.example $DEPLOY_DIR/$APP/manifest/config/config.yaml
              fi
          fi

          printf '%s\n' \
              '[Unit]' \
              "Description=GBaseAdmin $APP" \
              'After=network.target mysql.service' \
              '' \
              '[Service]' \
              'Type=simple' \
              "WorkingDirectory=$DEPLOY_DIR/$APP" \
              "ExecStart=$DEPLOY_DIR/$APP/$APP" \
              'MemoryAccounting=true' \
              'CPUAccounting=true' \
              'TasksAccounting=true' \
              "MemoryHigh=${{ env.BACKEND_SYSTEM_MEMORY_HIGH }}" \
              "MemoryMax=${{ env.BACKEND_SYSTEM_MEMORY_MAX }}" \
              "CPUQuota=${{ env.BACKEND_SYSTEM_CPU_QUOTA }}" \
              "TasksMax=${{ env.BACKEND_SERVICE_TASKS_MAX }}" \
              "Nice=${{ env.BACKEND_SERVICE_NICE }}" \
              "OOMScoreAdjust=${{ env.BACKEND_SYSTEM_OOM_SCORE_ADJUST }}" \
              'Restart=always' \
              'RestartSec=5' \
              'LimitNOFILE=65536' \
              '' \
              '[Install]' \
              'WantedBy=multi-user.target' \
              > /etc/systemd/system/$SERVICE_NAME.service

          echo "[$APP] Running database migrations..."
          $DEPLOY_DIR/migrate --config $DEPLOY_DIR/$APP/manifest/config/config.yaml --dir $DEPLOY_DIR/database/migrations up

          echo "[$APP] Ensuring smoke test role/user..."
          $DEPLOY_DIR/bin/ensure-smoke-user \
            --config $DEPLOY_DIR/$APP/manifest/config/config.yaml \
            --username "$SMOKE_USERNAME" \
            --password "$SMOKE_PASSWORD"

          echo "[$APP] Backfilling upload file dir_id..."
          $DEPLOY_DIR/bin/upload-backfill \
            --config $DEPLOY_DIR/$APP/manifest/config/config.yaml

          systemctl daemon-reload
          systemctl stop $SERVICE_NAME 2>/dev/null || true
          systemctl stop $LEGACY_SERVICE_NAME 2>/dev/null || true
          systemctl disable $LEGACY_SERVICE_NAME 2>/dev/null || true

          for i in $(seq 1 10); do
              if ! pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then break; fi
              sleep 1
          done

          if pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
              pkill -TERM -f -x "$APP_BIN" 2>/dev/null || true
              sleep 2
          fi
          if pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
              pkill -KILL -f -x "$APP_BIN" 2>/dev/null || true
              sleep 1
          fi
          if pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
              echo "[$APP] Process still running after stop" >&2
              exit 1
          fi

          mv -f $APP_BIN_NEW $APP_BIN

          echo "[$APP] Starting service..."
          systemctl enable $SERVICE_NAME
          systemctl start $SERVICE_NAME

          for i in $(seq 1 8); do
              status=$(systemctl is-active $SERVICE_NAME 2>/dev/null || echo 'unknown')
              if [ "$status" = "active" ]; then break; fi
              sleep 1
          done

          status=$(systemctl is-active $SERVICE_NAME 2>/dev/null || echo 'unknown')
          echo "[$APP] Status: $status"
          if [ "$status" != "active" ]; then exit 1; fi

          HEALTH_URL=http://127.0.0.1:10022/readyz
          echo "[$APP] Health check: $HEALTH_URL"
          for i in $(seq 1 15); do
              if curl --silent --show-error --fail "$HEALTH_URL" >/dev/null; then
                  break
              fi
              sleep 2
          done
          curl --silent --show-error --fail "$HEALTH_URL" >/dev/null

          rm -rf /tmp/gba_stage/$APP /tmp/gba_stage/database /tmp/gba_stage/migrate /tmp/gba_stage/bin
          EOF

  deploy-upload:
    needs: [detect-changes, deploy-system]
    if: |
      always() &&
      (needs.deploy-system.result == 'success' || needs.deploy-system.result == 'skipped') &&
      (
        needs.detect-changes.outputs.target == 'all' ||
        needs.detect-changes.outputs.target == 'backend' ||
        (
          needs.detect-changes.outputs.target == 'auto' &&
          (
            needs.detect-changes.outputs.backend == 'true' ||
            needs.detect-changes.outputs.infra == 'true'
          )
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: admin-go/go.sum

      - name: Build upload
        run: |
          cd admin-go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -o upload ./app/upload/main.go

      - name: Validate deploy SSH secret
        run: |
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy upload
        env:
          REMOTE: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
        run: |
          ssh $REMOTE "mkdir -p /tmp/gba_stage/upload"
          scp admin-go/upload $REMOTE:/tmp/gba_stage/upload/upload
          scp -r admin-go/app/upload/manifest $REMOTE:/tmp/gba_stage/upload/
          ssh $REMOTE bash <<'EOF'
          set -e
          APP=upload
          DEPLOY_DIR=/www/wwwroot/baseadmin.easytestdev.online
          SERVICE_NAME=baseadmin-$APP
          LEGACY_SERVICE_NAME=gba-$APP
          APP_BIN=$DEPLOY_DIR/$APP/$APP
          APP_BIN_NEW=$DEPLOY_DIR/$APP/$APP.new

          echo "[$APP] Preparing service..."
          mkdir -p $DEPLOY_DIR/$APP
          install -m 0755 /tmp/gba_stage/$APP/$APP $APP_BIN_NEW
          mkdir -p $DEPLOY_DIR/$APP/resource/upload

          if [ ! -d $DEPLOY_DIR/$APP/manifest ]; then
              cp -r /tmp/gba_stage/$APP/manifest $DEPLOY_DIR/$APP/
          fi
          mkdir -p $DEPLOY_DIR/$APP/manifest/config
          if [ ! -f $DEPLOY_DIR/$APP/manifest/config/config.yaml ]; then
              if [ -f /tmp/gba_stage/$APP/manifest/config/config.yaml ]; then
                  cp /tmp/gba_stage/$APP/manifest/config/config.yaml $DEPLOY_DIR/$APP/manifest/config/config.yaml
              elif [ -f /tmp/gba_stage/$APP/manifest/config/config.yaml.example ]; then
                  cp /tmp/gba_stage/$APP/manifest/config/config.yaml.example $DEPLOY_DIR/$APP/manifest/config/config.yaml
              fi
          fi

          printf '%s\n' \
              '[Unit]' \
              "Description=GBaseAdmin $APP" \
              'After=network.target mysql.service' \
              '' \
              '[Service]' \
              'Type=simple' \
              "WorkingDirectory=$DEPLOY_DIR/$APP" \
              "ExecStart=$DEPLOY_DIR/$APP/$APP" \
              'MemoryAccounting=true' \
              'CPUAccounting=true' \
              'TasksAccounting=true' \
              "MemoryHigh=${{ env.BACKEND_UPLOAD_MEMORY_HIGH }}" \
              "MemoryMax=${{ env.BACKEND_UPLOAD_MEMORY_MAX }}" \
              "CPUQuota=${{ env.BACKEND_UPLOAD_CPU_QUOTA }}" \
              "TasksMax=${{ env.BACKEND_SERVICE_TASKS_MAX }}" \
              "Nice=${{ env.BACKEND_SERVICE_NICE }}" \
              "OOMScoreAdjust=${{ env.BACKEND_UPLOAD_OOM_SCORE_ADJUST }}" \
              'Restart=always' \
              'RestartSec=5' \
              'LimitNOFILE=65536' \
              '' \
              '[Install]' \
              'WantedBy=multi-user.target' \
              > /etc/systemd/system/$SERVICE_NAME.service

          systemctl daemon-reload
          systemctl stop $SERVICE_NAME 2>/dev/null || true
          systemctl stop $LEGACY_SERVICE_NAME 2>/dev/null || true
          systemctl disable $LEGACY_SERVICE_NAME 2>/dev/null || true

          for i in $(seq 1 10); do
              if ! pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then break; fi
              sleep 1
          done

          if pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
              pkill -TERM -f -x "$APP_BIN" 2>/dev/null || true
              sleep 2
          fi
          if pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
              pkill -KILL -f -x "$APP_BIN" 2>/dev/null || true
              sleep 1
          fi
          if pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
              echo "[$APP] Process still running after stop" >&2
              exit 1
          fi

          mv -f $APP_BIN_NEW $APP_BIN

          echo "[$APP] Starting service..."
          systemctl enable $SERVICE_NAME
          systemctl start $SERVICE_NAME

          for i in $(seq 1 8); do
              status=$(systemctl is-active $SERVICE_NAME 2>/dev/null || echo 'unknown')
              if [ "$status" = "active" ]; then break; fi
              sleep 1
          done

          status=$(systemctl is-active $SERVICE_NAME 2>/dev/null || echo 'unknown')
          echo "[$APP] Status: $status"
          if [ "$status" != "active" ]; then exit 1; fi

          HEALTH_URL=http://127.0.0.1:10023/readyz
          echo "[$APP] Health check: $HEALTH_URL"
          for i in $(seq 1 15); do
              if curl --silent --show-error --fail "$HEALTH_URL" >/dev/null; then
                  break
              fi
              sleep 2
          done
          curl --silent --show-error --fail "$HEALTH_URL" >/dev/null

          rm -rf /tmp/gba_stage/$APP
          EOF

  # ============================================
  # Build & Deploy frontend
  # ============================================
  deploy-frontend:
    needs: [detect-changes, deploy-upload, verify-frontend]
    if: |
      always() &&
      (needs.verify-frontend.result == 'success' || needs.verify-frontend.result == 'skipped') &&
      (needs.deploy-upload.result == 'success' || needs.deploy-upload.result == 'skipped') &&
      (
        needs.detect-changes.outputs.target == 'all' ||
        needs.detect-changes.outputs.target == 'frontend' ||
        (
          needs.detect-changes.outputs.target == 'auto' &&
          (
            needs.detect-changes.outputs.frontend == 'true' ||
            needs.detect-changes.outputs.infra == 'true'
          )
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-frontend-${{ hashFiles('vue-vben-admin/pnpm-lock.yaml') }}
          restore-keys: pnpm-frontend-

      - name: Install & Build frontend
        run: |
          cd vue-vben-admin
          pnpm install --frozen-lockfile
          pnpm build:antd

      - name: Validate deploy SSH secret
        run: |
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        env:
          REMOTE: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
        run: |
          cd vue-vben-admin/apps/web-antd/dist
          tar -czf /tmp/frontend.tar.gz .
          echo "Frontend size: $(du -h /tmp/frontend.tar.gz | cut -f1)"
          scp /tmp/frontend.tar.gz $REMOTE:/tmp/gba_frontend.tar.gz
          ssh $REMOTE bash <<'EOF'
          set -e
          DEPLOY_DIR=/www/wwwroot/baseadmin.easytestdev.online
          RELEASES_DIR=$DEPLOY_DIR/.releases/admin
          RELEASE_ID=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR=$RELEASES_DIR/$RELEASE_ID
          NEXT_LINK=$DEPLOY_DIR/admin.__new

          mkdir -p $RELEASES_DIR
          rm -rf $RELEASE_DIR
          mkdir -p $RELEASE_DIR
          tar -xzf /tmp/gba_frontend.tar.gz -C $RELEASE_DIR
          test -f $RELEASE_DIR/index.html

          rm -f $NEXT_LINK
          ln -s $RELEASE_DIR $NEXT_LINK

          if [ -d $DEPLOY_DIR/admin ] && [ ! -L $DEPLOY_DIR/admin ]; then
              LEGACY_BACKUP=$DEPLOY_DIR/.legacy-admin-$(date +%Y%m%d%H%M%S)
              mv $DEPLOY_DIR/admin $LEGACY_BACKUP
          fi

          mv -Tf $NEXT_LINK $DEPLOY_DIR/admin

          ls -1dt $RELEASES_DIR/* 2>/dev/null | tail -n +6 | xargs -r rm -rf
          rm -f /tmp/gba_frontend.tar.gz
          echo "Frontend deployed to $RELEASE_DIR"
          EOF

  # ============================================
  # Final status report
  # ============================================
  status-check:
    needs: [deploy-system, deploy-upload, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy SSH secret
        run: |
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure upload static mapping
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} 'bash -s' <<'EOF'
          set -euo pipefail
          NGINX_CONF=/www/server/panel/vhost/nginx/baseadmin.easytestdev.online.conf
          EXT_DIR=/www/server/panel/vhost/nginx/extension/baseadmin.easytestdev.online
          EXT_CONF=$EXT_DIR/baseadmin-upload-static.conf

          if [ ! -f "$NGINX_CONF" ]; then
              echo "nginx config not found: $NGINX_CONF" >&2
              exit 1
          fi

          mkdir -p "$EXT_DIR"
          printf '%s\n' \
              'location ^~ /upload/ {' \
              '    alias /www/wwwroot/baseadmin.easytestdev.online/upload/resource/upload/;' \
              '    expires 30d;' \
              '    add_header Cache-Control "public";' \
              '    access_log off;' \
              '}' \
              '' > "$EXT_CONF"

          # Clean up the broken block previously appended to the main conf.
          perl -0pi -e 's@\n?[ \t]*location \^~ /upload/ \{\n[ \t]*alias /www/wwwroot/baseadmin\.easytestdev\.online/upload/resource/upload/;\n[ \t]*expires 30d;\n[ \t]*add_header Cache-Control "public";\n[ \t]*access_log off;\n[ \t]*\}\n?@@g' "$NGINX_CONF"

          nginx -t
          systemctl reload nginx 2>/dev/null || nginx -s reload
          EOF

      - name: Check service status
        env:
          SYSTEM_DEPLOY_RESULT: ${{ needs.deploy-system.result }}
          UPLOAD_DEPLOY_RESULT: ${{ needs.deploy-upload.result }}
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} 'bash -s' <<'EOF'
          set -e
          echo "===== Service Status ====="
          for app in system upload; do
              status=$(systemctl is-active baseadmin-$app 2>/dev/null || echo "unknown")
              echo "baseadmin-$app: $status"
          done
          EOF

          if [ "$SYSTEM_DEPLOY_RESULT" = "success" ]; then
            ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "curl --silent --show-error --fail http://127.0.0.1:10022/readyz >/dev/null"
            echo "system ready: ok"
          else
            echo "system ready check skipped ($SYSTEM_DEPLOY_RESULT)"
          fi

          if [ "$UPLOAD_DEPLOY_RESULT" = "success" ]; then
            ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "curl --silent --show-error --fail http://127.0.0.1:10023/readyz >/dev/null"
            echo "upload ready: ok"
          else
            echo "upload ready check skipped ($UPLOAD_DEPLOY_RESULT)"
          fi

      - name: Smoke test live dir rule flow
        if: |
          needs.deploy-upload.result == 'success' ||
          needs.deploy-upload.result == 'skipped'
        env:
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$SMOKE_USERNAME"
          test -n "$SMOKE_PASSWORD"
          BASE_URL=https://${{ env.SERVER_HOST }}/api
          LOGIN_PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({"username": os.environ["SMOKE_USERNAME"], "password": os.environ["SMOKE_PASSWORD"]}))')
          TMP_FILE=$(mktemp --suffix=.txt)
          FILE_ID=""
          RULE_ID=""
          cleanup() {
            if [ -n "$FILE_ID" ]; then
              curl --silent --show-error \
                -X DELETE \
                -H "Authorization: Bearer $TOKEN" \
                -H 'Content-Type: application/json' \
                -d "{\"id\":\"$FILE_ID\"}" \
                "$BASE_URL/upload/file/delete" >/dev/null || true
            fi
            if [ -n "$RULE_ID" ]; then
              curl --silent --show-error \
                -X DELETE \
                -H "Authorization: Bearer $TOKEN" \
                -H 'Content-Type: application/json' \
                -d "{\"id\":\"$RULE_ID\"}" \
                "$BASE_URL/upload/dir_rule/delete" >/dev/null || true
            fi
            rm -f "$TMP_FILE"
          }
          trap cleanup EXIT

          LOGIN_JSON=$(curl --silent --show-error --fail \
            -H 'Content-Type: application/json' \
            -d "$LOGIN_PAYLOAD" \
            "$BASE_URL/system/auth/login")
          TOKEN=$(printf '%s' "$LOGIN_JSON" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
          test -n "$TOKEN"

          DIR_JSON=$(curl --silent --show-error --fail \
            -H "Authorization: Bearer $TOKEN" \
            "$BASE_URL/upload/dir/list?pageNum=1&pageSize=1&status=1")
          DIR_ID=$(printf '%s' "$DIR_JSON" | sed -n 's/.*"id":"\([0-9]*\)".*/\1/p')
          test -n "$DIR_ID"

          SOURCE="/ci-smoke/${{ github.run_id }}/${{ github.run_attempt }}"
          RULE_PAYLOAD=$(SOURCE="$SOURCE" DIR_ID="$DIR_ID" python3 -c 'import json, os; print(json.dumps({"dirID": os.environ["DIR_ID"], "category": 3, "fileType": os.environ["SOURCE"], "storageTypes": "1", "savePath": "ci-smoke/{Y-m-d}/{ext}", "status": 1}))')
          curl --silent --show-error --fail \
            -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$RULE_PAYLOAD" \
            "$BASE_URL/upload/dir_rule/create" >/dev/null

          RULE_LIST_JSON=$(curl --silent --show-error --fail \
            --get \
            -H "Authorization: Bearer $TOKEN" \
            --data-urlencode "pageNum=1" \
            --data-urlencode "pageSize=1" \
            --data-urlencode "keyword=$SOURCE" \
            "$BASE_URL/upload/dir_rule/list")
          RULE_ID=$(printf '%s' "$RULE_LIST_JSON" | sed -n 's/.*"id":"\([0-9]*\)".*/\1/p')
          test -n "$RULE_ID"
          echo "dir_rule create/list e2e: ok"

          printf 'deploy smoke %s\n' "$(date -u +%FT%TZ)" > "$TMP_FILE"
          UPLOAD_JSON=$(curl --silent --show-error --fail \
            -H "Authorization: Bearer $TOKEN" \
            -F "source=$SOURCE" \
            -F "file=@$TMP_FILE;type=text/plain" \
            "$BASE_URL/upload/file/upload")

          FILE_ID=$(printf '%s' "$UPLOAD_JSON" | sed -n 's/.*"id":"\([0-9]*\)".*/\1/p')
          FILE_URL=$(printf '%s' "$UPLOAD_JSON" | sed -n 's/.*"url":"\([^"]*\)".*/\1/p')
          test -n "$FILE_ID"
          test -n "$FILE_URL"

          FILE_DETAIL_JSON=$(curl --silent --show-error --fail \
            -H "Authorization: Bearer $TOKEN" \
            "$BASE_URL/upload/file/detail?id=$FILE_ID")
          FILE_DIR_ID=$(printf '%s' "$FILE_DETAIL_JSON" | sed -n 's/.*"dirID":"\([0-9]*\)".*/\1/p')
          test "$FILE_DIR_ID" = "$DIR_ID"
          echo "file record dir_id e2e: ok"

          curl --silent --show-error --fail --head \
            "https://${{ env.SERVER_HOST }}$FILE_URL" >/dev/null
          echo "public upload url smoke: ok"

      - name: Summary
        run: |
          echo "## Deploy Results" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| system | ${{ needs.deploy-system.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| upload | ${{ needs.deploy-upload.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
