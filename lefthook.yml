pre-commit:
  jobs:
    - name: verify-baseadmin-scope
      run: bash ./scripts/verify-baseadmin-scope.sh
    - name: verify-vben-pages
      run: bash ./scripts/verify-vben-pages.sh

pre-push:
  jobs:
    - name: verify-baseadmin-scope
      run: bash ./scripts/verify-baseadmin-scope.sh
    - name: backend-tests
      run: cd admin-go && go test ./...
    - name: codegen-tests
      run: cd admin-go/codegen && go test ./...
    - name: frontend-verify
      run: bash ./scripts/verify-vben-pages.sh
    - name: frontend-typecheck
      run: cd vue-vben-admin && pnpm -F @vben/web-antd typecheck
    - name: frontend-tests
      run: cd vue-vben-admin && pnpm test:web-antd
