# 数据库连接
database:
  host: ${MYSQL_HOST}
  port: ${MYSQL_PORT}
  user: ${MYSQL_USER}
  password: ${MYSQL_PASSWORD}
  dbname: ${MYSQL_DATABASE}

# 后端输出配置
backend:
  output: ../app/   # 输出根目录（应用目录由表名前缀决定）

# 前端输出配置
frontend:
  output: ../../vue-vben-admin/apps/web-antd/src/  # 输出根目录

allowed_apps:
  - system
  - upload
  - demo
  - member

# 跳过生成的公共字段（这些字段在表单中隐藏，不生成前端组件）
skip_fields:
  - created_at
  - updated_at
  - deleted_at
  - created_by
  - dept_id

# 菜单应用目录配置（新增应用时在此添加，无需修改生成器源码）
menu_apps:
  system:
    title: 系统管理
    icon: SettingOutlined
    sort: 10
  upload:
    title: 上传管理
    icon: CloudUploadOutlined
    sort: 20
  demo:
    title: Demo体验
    icon: ExperimentOutlined
    sort: 90
  member:
    title: 会员管理
    icon: TeamOutlined
    sort: 30

# 模块级菜单配置（可选，key 格式: 应用名/模块名）
