
# CLI tool, only in development environment.
# https://goframe.org/docs/cli
gfcli:
  run:
    path: "main.go"
    extra: ""
    watchPaths:
      - "internal"
      - "api"

  gen:
    dao:
      - link: "mysql:sql_baseadmin_easytestdev_online:4365d2c5953988@tcp(127.0.0.1:3306)/sql_baseadmin_easytestdev_online?charset=utf8mb4"
        tables: "system_daemon,system_dept,system_domain,system_menu,system_merchant,system_role,system_role_dept,system_role_menu,system_tenant,system_user_dept,system_user_role,system_users"
        removePrefix: "system_"
        descriptionTag: true
        noJsonTag: true
        noModelComment: false
        overwriteDao: false
        modelFile: ""
        tplDaoIndexPath: ""
        tplDaoInternalPath: ""

  docker:
    build: "-a amd64 -s linux -p temp -ew"
    tagPrefixes:
      - my.image.pub/my-app
